name: Beacon GitHub Enrich

# Retrofit real GitHub traction (stars, pushed_at, open_issues) onto existing
# scraped rows. Runs daily and on demand. Uses the Actions token (5000/hr).
on:
  schedule:
    - cron: "30 3 * * *"   # daily at 03:30 UTC
  workflow_dispatch: {}

concurrency:
  group: beacon-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: registry
        run: pip install -r scraper_requirements.txt
      - name: Enrich rows with real GitHub metadata
        working-directory: registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SLEEP_SECS: "1.2"
          ONLY_MISSING: "1"
        run: python enrich_github.py
