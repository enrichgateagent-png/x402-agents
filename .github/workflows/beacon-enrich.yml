name: Beacon GitHub Enrich

# Enrichment writes directly to SQLite and now runs on the GCP VM via cron
# (see scripts/gcp_deploy.sh). This workflow is manual-only for emergencies.
on:
  workflow_dispatch:
    inputs:
      registry_url:
        description: "GCP registry URL (must be reachable from GitHub Actions)"
        required: true
        default: "http://YOUR_GCP_VM_IP:8000"

concurrency:
  group: beacon-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: registry
        run: pip install -r requirements.txt
      - name: Enrich via registry API health check
        env:
          REGISTRY_URL: ${{ inputs.registry_url }}
        run: |
          echo "Enrichment should run on the GCP VM:"
          echo "  cd registry && SQLITE_DB_PATH=/home/gcp_user/beacon_prod.db python enrich_github.py"
          curl -fsS "${REGISTRY_URL%/}/healthz" || echo "Registry not reachable from Actions — run enrich on VM."
