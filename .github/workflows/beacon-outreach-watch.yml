name: Beacon Outreach Watch

# Passive PR watcher — read-only GitHub API checks every 12h.
# On merge ONLY: triggers one targeted manifest-scan (no PR comments, no spam).
# Designed to stay well under GitHub abuse thresholds.
on:
  schedule:
    - cron: "23 */12 * * *"   # twice per day, offset from other crons
  workflow_dispatch:

concurrency:
  group: beacon-outreach-watch
  cancel-in-progress: false

permissions:
  contents: write   # commit outreach-prs.json only when state changes
  actions: write    # dispatch manifest-scan once per merge
  pull-requests: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check outreach PRs (read-only)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, urllib.request
          from datetime import datetime, timezone

          path = "scripts/outreach-prs.json"
          data = json.load(open(path))
          changed = False
          to_scan: list[str] = []

          def gh_api(url: str) -> dict:
              req = urllib.request.Request(
                  f"https://api.github.com{url}",
                  headers={
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode())

          now = datetime.now(timezone.utc).isoformat()

          for pr in data.get("pull_requests", []):
              repo = pr["repo"]
              num = pr["pr_number"]
              owner = pr["owner"]
              prev_state = pr.get("state", "OPEN")

              info = gh_api(f"/repos/{repo}/pulls/{num}")
              state = info.get("state", "open").upper()
              merged = bool(info.get("merged_at"))
              merged_at = info.get("merged_at")

              new_state = "MERGED" if merged else state
              if new_state != prev_state or merged_at != pr.get("merged_at"):
                  pr["state"] = new_state
                  pr["merged_at"] = merged_at
                  changed = True
                  print(f"{repo}#{num}: {prev_state} -> {new_state}")

              if merged and not pr.get("scan_triggered_at"):
                  to_scan.append(owner)
                  pr["scan_triggered_at"] = now
                  changed = True
                  print(f"Queue manifest scan for owner={owner}")

          json.dump(data, open(path, "w"), indent=2)
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
              f.write(f"owners={','.join(to_scan)}\n")
          PY

      - name: Commit tracker if state changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/outreach-prs.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update outreach PR tracker [skip ci]"
          git push

      - name: Trigger manifest scan for newly merged PRs
        if: steps.check.outputs.owners != ''
        env:
          GH_TOKEN: ${{ github.token }}
          OWNERS: ${{ steps.check.outputs.owners }}
        run: |
          set -euo pipefail
          IFS=',' read -ra LIST <<< "$OWNERS"
          for owner in "${LIST[@]}"; do
            [ -z "$owner" ] && continue
            echo "Dispatching manifest-scan for owner=${owner}"
            gh workflow run beacon-manifest-scan.yml -f "owner=${owner}"
            sleep 60
          done
