name: Beacon Manifest Scan

# The MUSCLE — a deterministic cron (no LLM). Sweeps the indexed github repos
# and auto-upgrades any that publish a beacon.json to a verified, self-declared
# entry. Rolling offset walks the whole ~24k index over the run cycle; the
# ?owner= on-demand scan (run manually after outreach) handles instant upgrades.
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h
  workflow_dispatch:
    inputs:
      owner:
        description: "Scan a single org on demand (e.g. after outreach)"
        required: false
        default: ""

concurrency:
  group: beacon-manifest-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Sweep for beacon.json manifests
        env:
          BASE: https://registry-ruby.vercel.app
          TOKEN: ${{ secrets.BEACON_ADMIN_TOKEN }}
          OWNER: ${{ github.event.inputs.owner }}
        run: |
          set -euo pipefail
          scan() {  # $1 = query string
            RESP=$(curl -fsS -m 90 -X POST "${BASE}/api/admin/manifest-scan?$1" -H "x-admin-token: ${TOKEN}")
            echo "$RESP"
            echo "$RESP" | grep -q '"ok":true' || { echo "scan failed"; exit 1; }
            echo "$RESP" | grep -o '"upgraded":[0-9]*' | grep -o '[0-9]*'
          }

          if [ -n "${OWNER}" ]; then
            # Primary adoption path: instant, targeted upgrade after outreach.
            echo "On-demand scan of org: ${OWNER}"
            scan "owner=${OWNER}&limit=200"
            exit 0
          fi

          # Background trickle only. GitHub rate-limits raw requests at volume, and
          # ~all repos have no manifest, so we sweep in small safe batches. The real
          # adoption paths are ?owner= (above) and self-serve POST /manifest/ingest.
          BATCH=50; N=6
          BASE_OFFSET=$(( (${{ github.run_number }} * BATCH * N) % 24000 ))
          TOTAL=0
          for i in $(seq 0 $((N-1))); do
            OFF=$(( BASE_OFFSET + i * BATCH ))
            UP=$(scan "limit=${BATCH}&offset=${OFF}")
            TOTAL=$(( TOTAL + UP ))
          done
          echo "Rolling sweep upgraded ${TOTAL} repo(s) this run."
