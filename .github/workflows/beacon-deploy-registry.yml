# Deploy Beacon registry to GCP VM after code changes.
# Requires repo secret GCP_SSH_KEY (private key for areej@34.67.113.114).
name: Deploy registry to GCP

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "registry/main.py"
      - "registry/analytics.py"
      - "registry/turso.py"
      - "scripts/start-beacon.sh"
      - "scripts/hotfix_deploy_registry.sh"
      - ".github/workflows/beacon-deploy-registry.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload registry files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 34.67.113.114
          username: areej
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "registry/main.py,registry/analytics.py,registry/seo.py"
          # strip the leading "registry/" so files land at
          # ~/x402-agents/registry/main.py — NOT nested at registry/registry/…
          strip_components: 1
          target: "x402-agents/registry/"

      - name: Upload start script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 34.67.113.114
          username: areej
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "scripts/start-beacon.sh"
          target: "/home/areej/"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.67.113.114
          username: areej
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            export PATH="$HOME/.nvm/versions/node/v20.20.2/bin:$HOME/beacon-venv/bin:$PATH"
            mv -f ~/start-beacon.sh ~/start-beacon.sh 2>/dev/null || true
            chmod +x ~/start-beacon.sh 2>/dev/null || true
            if [[ -f ~/x402-agents/ecosystem.config.cjs ]]; then
              sed -i 's/--workers 2/--workers 1/g' ~/x402-agents/ecosystem.config.cjs
              sed -i 's|PUBLIC_BASE_URL: "http://[^"]*"|PUBLIC_BASE_URL: "https://registry-ruby.vercel.app"|g' ~/x402-agents/ecosystem.config.cjs
            fi
            # Clean up any file wrongly nested by earlier (pre-strip) deploys.
            rm -f ~/x402-agents/registry/registry/main.py ~/x402-agents/registry/registry/analytics.py 2>/dev/null || true
            rmdir ~/x402-agents/registry/registry 2>/dev/null || true
            echo "Deployed main.py: $(ls -l ~/x402-agents/registry/main.py)"
            pm2 restart beacon-registry
            # Wait (up to ~40s) for the app to rebind port 8000 after restart.
            BODY=""
            for i in $(seq 1 20); do
              sleep 2
              BODY=$(curl -fsS "http://127.0.0.1:8000/api/v1/search?q=agent&limit=1" 2>/dev/null) && break
            done
            echo "healthz: $(curl -fsS http://127.0.0.1:8000/healthz | head -c 200)"
            echo ""
            # Hard gate: prove the NEW code is actually serving. The search
            # endpoint now returns an "include_inactive" field; if it's missing,
            # pm2 is still running stale code — fail the deploy loudly.
            echo "$BODY" | grep -q '"include_inactive"' \
              && echo "✓ new search code is live" \
              || { echo "✗ DEPLOY FAILED: app not serving new code"; echo "$BODY" | head -c 300; pm2 logs beacon-registry --lines 30 --nostream; exit 1; }
