name: Beacon Indexer

# Harvester runs on the GCP VM only — do NOT schedule on GitHub Actions (was hitting Turso via Vercel).
on:
  workflow_dispatch: {}

concurrency:
  group: beacon-indexer
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 120       # let a full sweep finish instead of being cancelled
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: registry
        run: pip install -r scraper_requirements.txt

      - name: Run indexer
        working-directory: registry
        env:
          # The workflow's built-in token lifts GitHub API limits to 5000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Override if your registry URL changes; secret takes precedence.
          REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'http://34.45.7.252:8000' }}
          MAX_PAGES: "10"
          MAX_PER_QUERY: "1000"
          THROTTLE_SECS: "1"
        run: python scraper_agent.py

      - name: Refresh reachability matrix
        # After harvesting, run the serverless batch validator so the online/
        # reachable matrix refreshes every 6h. Non-fatal: never fail the run on
        # a transient validator hiccup.
        continue-on-error: true
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'http://34.45.7.252:8000' }}
        run: |
          echo "Triggering batch validation..."
          curl -sS -X POST "${REGISTRY_URL%/}/api/v1/validate?limit=100" \
            -H "content-type: application/json" \
            -w "\nHTTP %{http_code}\n"
